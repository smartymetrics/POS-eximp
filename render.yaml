services:
  - type: web
    name: pos-eximp-finance
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ADMIN_ALERT_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.8
