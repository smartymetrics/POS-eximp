<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Inspection | Eximp & Cloves</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C47D0A;
            --gold-light: #EAB308;
            --bg-dark: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-gray: #A1A1AA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 10% 20%, rgba(196, 125, 10, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(196, 125, 10, 0.05) 0%, transparent 40%);
        }

        .booking-container {
            width: 100%;
            max-width: 500px;
            padding: 24px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.05);
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .slot-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .slot-btn:hover {
            border-color: var(--gold);
            color: white;
        }

        .slot-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: black;
        }

        .slot-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .btn-submit {
            width: 100%;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(196, 125, 10, 0.3);
        }

        .success-screen {
            text-align: center;
            display: none;
        }

        .success-icon {
            font-size: 64px;
            color: var(--gold);
            margin-bottom: 24px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #loading {
            display: none;
            margin-top: 20px;
            text-align: center;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="booking-container">
        <div class="glass-card" id="bookingCard">
            <div class="header">
                <div class="logo">EXIMP & CLOVES</div>
                <h1 class="title">Book Inspection</h1>
                <p class="subtitle">Experience your future property in person. Secure your premium viewing slot today.</p>
            </div>

            <form id="bookingForm">
                <div class="form-group">
                    <label>Your Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="080 1234 5678" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Date</label>
                    <input type="date" id="datePicker" required>
                </div>

                <div class="form-group">
                    <label>Available Times</label>
                    <div id="slotsContainer" class="slots-grid">
                        <div style="grid-column: span 3; color: #555; font-size: 13px; font-style: italic;">Select a date to see times...</div>
                    </div>
                    <input type="hidden" id="selectedTime" required>
                </div>

                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea id="notes" rows="2" placeholder="Tell us anything specific..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Confirm Booking <i class="fas fa-chevron-right"></i>
                </button>
                <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Processing...</div>
            </form>
        </div>

        <div class="glass-card success-screen" id="successScreen">
            <div class="success-icon">
                <i class="fas fa-calendar-check"></i>
            </div>
            <h1 class="title">Booking Confirmed!</h1>
            <p class="subtitle" id="successMessage">We've reserved your slot. A confirmation email with tour details has been sent to your inbox.</p>
            <button class="btn-submit" style="margin-top: 32px;" onclick="window.location.reload()">
                Book Another
            </button>
        </div>
    </div>

    <script>
        const datePicker = document.getElementById('datePicker');
        const slotsContainer = document.getElementById('slotsContainer');
        const selectedTimeInput = document.getElementById('selectedTime');
        const bookingForm = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');

        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        datePicker.min = today;

        datePicker.addEventListener('change', async (e) => {
            const date = e.target.value;
            slotsContainer.innerHTML = '<div style="grid-column: span 3; text-align: center;"><i class="fas fa-circle-notch fa-spin"></i></div>';
            
            try {
                const res = await fetch(`/api/scheduling/slots?date_str=${date}`);
                const slots = await res.json();
                
                if (slots.length === 0) {
                    slotsContainer.innerHTML = '<div style="grid-column: span 3; color: #ef4444; font-size: 13px;">No slots available for this day.</div>';
                    return;
                }

                slotsContainer.innerHTML = slots.map(slot => {
                    const time = new Date(slot).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `<button type="button" class="slot-btn" onclick="selectSlot(this, '${slot}')">${time}</button>`;
                }).join('');
            } catch (err) {
                slotsContainer.innerHTML = '<div style="grid-column: span 3; color: #ef4444; font-size: 13px;">Error loading slots.</div>';
            }
        });

        function selectSlot(btn, time) {
            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedTimeInput.value = time;
        }

        bookingForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedTimeInput.value) {
                alert('Please select a time slot.');
                return;
            }

            submitBtn.style.display = 'none';
            loading.style.display = 'block';

            const payload = {
                contact_name: document.getElementById('name').value,
                contact_email: document.getElementById('email').value,
                contact_phone: document.getElementById('phone').value,
                scheduled_at: selectedTimeInput.value,
                notes: document.getElementById('notes').value
            };

            try {
                const res = await fetch('/api/scheduling/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    document.getElementById('bookingCard').style.display = 'none';
                    document.getElementById('successScreen').style.display = 'block';
                    const time = new Date(payload.scheduled_at).toLocaleString();
                    document.getElementById('successMessage').innerText = `We've reserved your slot for ${time}. A confirmation email has been sent.`;
                } else {
                    const data = await res.json();
                    alert(data.detail || 'Failed to book.');
                    submitBtn.style.display = 'flex';
                    loading.style.display = 'none';
                }
            } catch (err) {
                alert('Connection error.');
                submitBtn.style.display = 'flex';
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
