<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding & Payouts | Eximp & Cloves</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090B;
            --card: #121214;
            --brand: #C47D0A; /* Premium Gold */
            --accent: #FFC107;
            --text: #F8FAFC;
            --muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(18, 18, 20, 0.7);
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(196, 125, 10, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(196, 125, 10, 0.03) 0%, transparent 50%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .portal-container {
            width: 100%;
            max-width: 650px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area img { height: 60px; margin-bottom: 20px; filter: brightness(1.2); }
        .logo-area h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 32px; 
            background: linear-gradient(135deg, #FFF 0%, var(--brand) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .logo-area p { color: var(--muted); font-size: 15px; letter-spacing: 0.5px; }

        .type-selector {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            gap: 8px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .type-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .type-btn i { font-size: 18px; color: var(--muted); transition: 0.4s; }
        .type-btn span { font-size: 13px; font-weight: 600; color: var(--muted); transition: 0.4s; }
        
        .type-btn:hover { background: rgba(255, 255, 255, 0.05); }

        .type-btn.active {
            background: linear-gradient(135deg, rgba(196, 125, 10, 0.2) 0%, rgba(196, 125, 10, 0.05) 100%);
            border-color: rgba(196, 125, 10, 0.3);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }
        .type-btn.active i { color: var(--brand); transform: translateY(-2px); }
        .type-btn.active span { color: #fff; }

        .form-section {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 12px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--brand); 
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            pointer-events: none;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--brand);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(196, 125, 10, 0.1);
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.01);
        }
        .upload-area:hover { 
            border-color: var(--brand); 
            background: rgba(196, 125, 10, 0.03); 
            transform: translateY(-2px);
        }
        .upload-area i { font-size: 32px; color: var(--muted); margin-bottom: 12px; }
        .upload-area p { color: var(--muted); font-size: 14px; margin-bottom: 4px; }
        .upload-area span { color: var(--brand); font-weight: 600; font-size: 13px; }

        .verification-box {
            margin-top: 40px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 14px;
            line-height: 1.6;
        }

        .checkbox-container {
            display: flex;
            gap: 12px;
            cursor: pointer;
            align-items: flex-start;
        }
        .checkbox-container input {
            width: 20px;
            height: 20px;
            padding: 0;
            margin-top: 2px;
            accent-color: var(--brand);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 32px;
            transition: all 0.4s;
            box-shadow: 0 20px 40px -10px rgba(196, 125, 10, 0.3);
        }
        .submit-btn:hover { 
            transform: translateY(-2px) scale(1.01); 
            box-shadow: 0 25px 50px -10px rgba(196, 125, 10, 0.4);
        }
        .submit-btn:active { transform: scale(0.98); }

        .payout-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            color: var(--success);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .hidden { display: none; }

        @media (max-width: 600px) {
            .portal-container { padding: 32px 24px; }
            .input-row { grid-template-columns: 1fr; gap: 0; }
            .type-btn span { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="logo-area">
            <img src="/static/img/logo.svg" onerror="this.src='https://via.placeholder.com/150x50/1A1D23/D4AF37?text=EXIMP+%26+CLOVES'" alt="Eximp & Cloves">
            <h1>Onboarding & Claims</h1>
            <p id="portal-subtitle">Secure payout registration for verified partners</p>
        </div>

        <div class="type-selector">
            <div class="type-btn active" onclick="setType('company')">
                <i class="fas fa-building"></i>
                <span>Company</span>
            </div>
            <div class="type-btn" onclick="setType('individual')">
                <i class="fas fa-user-tie"></i>
                <span>Contractor</span>
            </div>
            <div class="type-btn" onclick="setType('staff')">
                <i class="fas fa-id-badge"></i>
                <span>Staff Member</span>
            </div>
        </div>

        <div class="payout-info">
            <i class="fas fa-shield-alt"></i>
            <span>End-to-end encrypted financial data handling active.</span>
        </div>

        <form id="payoutForm">
            <div class="form-section">
                <!-- Name Field -->
                <div class="form-group">
                    <label id="name-label">Official Company Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-university"></i>
                        <input type="text" id="payee_name" required placeholder="Legal entity name">
                    </div>
                </div>

                <!-- ID & TIN Row -->
                <div class="input-row">
                    <div class="form-group">
                        <label id="id-label">RC Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-hashtag"></i>
                            <input type="text" id="payee_id_number" placeholder="RC-XXXXXX">
                        </div>
                    </div>
                    <div class="form-group" id="tin-group">
                        <label>Tax ID (TIN)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-stamp"></i>
                            <input type="text" id="payee_tin" placeholder="For tax compliance">
                        </div>
                    </div>
                </div>

                <!-- Bank Info Section -->
                <div style="border-top: 1px solid var(--border); margin: 30px 0; padding-top: 30px;">
                    <!-- Searchable Bank Selection -->
                    <div class="form-group" style="position: relative;">
                        <label>Bank Selection</label>
                        <div class="input-wrapper">
                            <i class="fas fa-piggy-bank"></i>
                            <input type="text" id="bank_search" placeholder="Search for your bank..." onfocus="showBankDropdown()" oninput="filterBanks()" autocomplete="off">
                            <input type="hidden" id="bank_name" name="bank_name" required>
                        </div>
                        
                        <div id="bank_dropdown" class="hidden" style="position: absolute; top: 100%; left: 0; width: 100%; background: #1A1A1E; border: 1px solid var(--border); border-radius: 12px; margin-top: 8px; z-index: 50; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                            <!-- Options injected by JS -->
                        </div>
                    </div>

                    <!-- Custom Bank Input (Hidden by default) -->
                    <div id="other_bank_group" class="form-group hidden">
                        <label>Custom Bank Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-university"></i>
                            <input type="text" id="custom_bank_name" placeholder="Enter bank name manually">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="form-group">
                            <label>Account Number</label>
                            <div class="input-wrapper">
                                <i class="fas fa-credit-card"></i>
                                <input type="text" id="acc_number" required maxlength="10" placeholder="10 digits">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Settlement Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user-check"></i>
                                <input type="text" id="acc_name" required placeholder="Account name">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Document Upload -->
                <div class="form-group">
                    <label id="upload-label">Certificate of Incorporation (CAC) <span style="color:var(--muted); font-size:10px; font-weight:400;">(Optional)</span></label>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p id="file-name">Drag and drop or click to browse</p>
                        <span>PDF, JPG or PNG (Max 5MB)</span>
                        <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf" onchange="updateFileName(this)">
                    </div>
                </div>

                <!-- Compliance Box -->
                <div class="verification-box">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span>I certify that I am authorized to submit these details for payout and that <b>payment is requested only for satisfactory services rendered or goods delivered</b>. I understand that Eximp & Cloves processes claims only against <b>audited and approved proforma invoices</b>. Payment terms apply.</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Finalize Onboarding</button>
            </div>
        </form>
    </div>

    <script>
        let currentType = 'company';

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const nameLabel = document.getElementById('name-label');
            const idLabel = document.getElementById('id-label');
            const uploadLabel = document.getElementById('upload-label');
            const tinGroup = document.getElementById('tin-group');
            const nameIcon = document.querySelector('.form-group .fa-university');

            const optSuffix = ' <span style="color:var(--muted); font-size:10px; font-weight:400;">(Optional)</span>';

            if (type === 'company') {
                nameLabel.innerText = 'Official Company Name';
                idLabel.innerText = 'RC Number';
                uploadLabel.innerHTML = 'Certificate of Incorporation (CAC)' + optSuffix;
                tinGroup.classList.remove('hidden');
                nameIcon.className = 'fas fa-university';
            } else if (type === 'individual') {
                nameLabel.innerText = 'Full Legal Name';
                idLabel.innerText = 'Govt. ID Number';
                uploadLabel.innerHTML = 'Valid ID (NIN/Voters/Drivers)' + optSuffix;
                tinGroup.classList.add('hidden');
                nameIcon.className = 'fas fa-user-circle';
            } else {
                nameLabel.innerText = 'Employee Full Name';
                idLabel.innerText = 'Employee ID Number';
                uploadLabel.innerHTML = 'Employee ID Card / NIN' + optSuffix;
                tinGroup.classList.add('hidden');
                nameIcon.className = 'fas fa-id-card-alt';
            }
        }

        function updateFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : 'Drag and drop or click to browse';
            document.getElementById('file-name').innerHTML = `<strong>Selected:</strong> ${fileName}`;
        }

        // --- BANK SEARCH LOGIC ---
        const allBanks = [
            "Access Bank", "Zenith Bank", "First Bank", "United Bank for Africa (UBA)", 
            "Guaranty Trust Bank (GTBank)", "Fidelity Bank", "Union Bank", "Stanbic IBTC", 
            "Sterling Bank", "Wema Bank", "Ecobank", "First City Monument Bank (FCMB)", 
            "Keystone Bank", "Polaris Bank", "Unity Bank", "Heritage Bank", 
            "Premium Trust Bank", "Optimus Bank", "Titan Trust Bank", "SunTrust Bank", 
            "Providus Bank", "Globus Bank", "Parallex Bank", "Signature Bank", 
            "Jaiz Bank", "Taj Bank", "Lotus Bank", "Alternative Bank (AltBank)", 
            "OPay", "PalmPay", "Moniepoint", "Kuda Bank", "FairMoney", "Carbon", 
            "Alat by Wema", "VFD Microfinance Bank", "Rubies Bank", "Sparkle", 
            "GoMoney", "Mint Digital Bank", "Eyowo", "Pocket by PiggyVest", 
            "9PSB", "MTN MoMo PSB", "Airtel SmartCash PSB", "Glo MoneyMaster PSB", "Hope PSB",
            "Other"
        ];

        function showBankDropdown() {
            const dropdown = document.getElementById('bank_dropdown');
            dropdown.classList.remove('hidden');
            renderBankList(allBanks);
        }

        function filterBanks() {
            const query = document.getElementById('bank_search').value.toLowerCase();
            const filtered = allBanks.filter(b => b.toLowerCase().includes(query));
            renderBankList(filtered);
        }

        function renderBankList(list) {
            const dropdown = document.getElementById('bank_dropdown');
            if (list.length === 0) {
                dropdown.innerHTML = '<div style="padding: 12px 16px; color: var(--muted); font-size: 13px;">No banks found. Select "Other" to type.</div>';
                return;
            }
            dropdown.innerHTML = list.map(bank => `
                <div onclick="selectBank('${bank}')" style="padding: 12px 16px; cursor: pointer; color: #fff; font-size: 14px; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02);" onmouseover="this.style.background='rgba(196,125,10,0.1)'" onmouseout="this.style.background='transparent'">
                    ${bank === 'Other' ? '<strong>' + bank + '</strong>' : bank}
                </div>
            `).join('');
        }

        function selectBank(bank) {
            document.getElementById('bank_search').value = bank;
            document.getElementById('bank_name').value = bank;
            document.getElementById('bank_dropdown').classList.add('hidden');
            
            const otherGroup = document.getElementById('other_bank_group');
            if (bank === 'Other') {
                otherGroup.classList.remove('hidden');
                document.getElementById('custom_bank_name').required = true;
            } else {
                otherGroup.classList.add('hidden');
                document.getElementById('custom_bank_name').required = false;
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('bank_dropdown');
            const searchInput = document.getElementById('bank_search');
            if (!dropdown.contains(e.target) && e.target !== searchInput) {
                dropdown.classList.add('hidden');
            }
        });

        document.getElementById('payoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            
            // Check if "Other" was selected and update bank_name
            if (document.getElementById('bank_name').value === 'Other') {
                const custom = document.getElementById('custom_bank_name').value;
                if (!custom) {
                    alert('Please enter your bank name');
                    return;
                }
                document.getElementById('bank_name').value = custom;
            }

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Securing Data...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            // Real backend integration would go here
            
            setTimeout(() => {
                alert('Onboarding secure transmission complete. Our finance desk will verify your details within 48 hours.');
                window.location.reload();
            }, 2000);
        };

        // Initialize view
        setType('company');
    </script>
</body>
</html>
