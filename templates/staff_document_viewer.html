<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Document | Eximp & Cloves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0F1115;
            color: #E5E7EB;
        }
        .document-viewer {
            font-family: 'Times New Roman', serif;
            background: white;
            color: #000;
            margin: 20px auto;
            max-width: 850px;
            padding: 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            line-height: 1.6;
        }
        .brand-gold { color: #C47D0A; }
        .top-bar {
            background: #1E2128;
            border-bottom: 1px solid #2D2F36;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-primary { background: #C47D0A; color: white; border-color: #C47D0A; }
        .btn-primary:hover { background: #B36B00; }
        .btn-secondary { background: #2D2F36; color: #9CA3AF; border-color: #3F4249; }
        .btn-secondary:hover { color: white; border-color: #C47D0A; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="flex items-center gap-4">
            <img src="/static/img/logo_dark.svg" alt="" style="height: 24px;">
            <span class="text-brand-gold font-bold text-xs uppercase">Document Viewer</span>
            <span id="doc-title" class="text-gray-400 text-sm">—</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="downloadPDF()" class="btn btn-primary">⬇ Download PDF</button>
            <button onclick="printDocument()" class="btn btn-secondary">🖨 Print</button>
            <button onclick="window.history.back()" class="btn btn-secondary">← Back</button>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loading" class="text-center py-20">
        <div class="inline-block">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-gold"></div>
            <p class="text-gray-400 mt-4 text-sm">Loading document...</p>
        </div>
    </div>

    <!-- Document Viewer -->
    <div id="viewer" class="hidden">
        <div id="content" class="document-viewer"></div>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden text-center py-20">
        <p class="text-red-400">⚠ Unable to load document. Access denied or document not found.</p>
        <button onclick="window.history.back()" class="mt-6 btn btn-secondary">← Go Back</button>
    </div>

    <script>
        const API_BASE = '/api/hr-legal';
        const matterId = new URLSearchParams(window.location.search).get('id');

        async function loadDocument() {
            const loadingEl = document.getElementById('loading');
            const viewerEl = document.getElementById('viewer');
            const errorEl = document.getElementById('error');
            const contentEl = document.getElementById('content');
            const titleEl = document.getElementById('doc-title');

            loadingEl.classList.remove('hidden');
            viewerEl.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/staff/self/visible-matters/${matterId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('ec_token')}` }
                });

                if (!res.ok) throw new Error('Access denied');
                const matter = await res.json();

                titleEl.textContent = matter.title;
                contentEl.innerHTML = matter.content_html || '<p>No content available.</p>';

                loadingEl.classList.add('hidden');
                viewerEl.classList.remove('hidden');
            } catch (err) {
                console.error('Error loading document:', err);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        function downloadPDF() {
            // Trigger PDF export via API
            window.location.href = `${API_BASE}/matters/${matterId}/export`;
        }

        function printDocument() {
            window.print();
        }

        document.addEventListener('DOMContentLoaded', loadDocument);
    </script>
</body>
</html>
